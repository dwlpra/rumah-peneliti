version: '3.8'
services:
  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3001
      - NEXT_PUBLIC_CONTRACT_ADDRESS=0xF5E23E98a6a93Db2c814a033929F68D5B74445E2
      - NEXT_PUBLIC_CHAIN_ID=16661
      - NEXT_PUBLIC_RPC_URL=https://evmrpc.0g.ai
    depends_on:
      - backend

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - backend-data:/app/data
      - backend-uploads:/app/uploads
    environment:
      - PORT=3001
      - NODE_ENV=production
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_API_URL=https://api.z.ai/api/paas/v4/chat/completions
      - RPC_URL=https://evmrpc.0g.ai
      - CONTRACT_ADDRESS=0xF5E23E98a6a93Db2c814a033929F68D5B74445E2
      - PRIVATE_KEY=${PRIVATE_KEY}
      - CHAIN_ID=16661
      - PAPER_ANCHOR_ADDRESS=0x4ad80352231407Afa845c5428fa8fE870b4509A9
      - NFT_CONTRACT_ADDRESS=0x78C414367A91917fe5DC8123119467c9910a4B6d
      - AGENT_NFT_ADDRESS=0x9ebf66F0818db38BD55f1337b8a83E97c8e095C6
      - AGENT_TIP_JAR_ADDRESS=0x7e59BB6ff6C58D03C07bdFC35040b4A08779A9f6

volumes:
  backend-data:
  backend-uploads:
